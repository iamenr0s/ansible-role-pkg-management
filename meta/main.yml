---
galaxy_info:
  role_name: ansible_role_pkg_management
  author: "iamenr0s"
  description: "Cross-distro package management for Debian/Ubuntu and RHEL-family (Rocky/Alma/Fedora)."
  license: MIT
  min_ansible_version: "2.9"
  platforms:
    - name: "Debian"
      versions:
        - "bookworm"
        - "trixie"
    - name: "EL"
      versions:
        - "8"
        - "9"
        - "10"
    - name: "Fedora"
      versions:
        - "42"
        - "43"
        - "44"
    # Rocky Linux is covered under EL support; remove explicit entry to satisfy
    # ansible-lint schema expectations for platforms.
    - name: "Ubuntu"
      versions:
        - "jammy"
        - "noble"
  galaxy_tags:
    - packages
    - apt
    - yum
    - dnf
    - debian
    - ubuntu
    - rhel
    - rocky
    - almalinux
    - fedora

dependencies: []
collections: []
